<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CBT Exam Access Card</title>

<link rel="stylesheet" href="student-card.css">

<!-- Font Awesome -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="card">

    <!-- Header -->
    <div class="header">

        <img src="assets/logo.png" class="logo">

        <div class="title">

            <h1>COACHsir Academy</h1>

            <span>CBT EXAM ACCESS CARD</span>

        </div>

    </div>

    <!-- Student Area -->

    <div class="student">

        <img id="studentPhoto"
        src="assets/student.png">

        <div class="details">

            <h2 id="studentName">Loading...</h2>

            <p>
                <b>ID :</b>
                <span id="studentId">------</span>
            </p>

            <p>
                <b>Program :</b>
                <span id="program">------</span>
            </p>

            <p>
                <b>Valid Till :</b>
                <span id="expiry">------</span>
            </p>

        </div>

    </div>

    <!-- QR -->

    <div class="qr-area">

        <div id="qrcode"></div>

    </div>

    <!-- Status -->

    <div class="status">

        <div id="paymentStatus">
            PAYMENT
        </div>

        <div id="accessStatus">
            ACTIVE
        </div>

    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script src="student-card.js"></script>

</body>

</html>
