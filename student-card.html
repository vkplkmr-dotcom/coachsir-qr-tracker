<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Virtual Access Card</title>

<link rel="stylesheet" href="student-card.css">

<!-- Font Awesome -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>
<body>

<div class="card">

    <div class="top">

        <img src="assets/logo.png" class="logo">

        <div class="academy">
            COACHsir Academy
            <span>Virtual Student Access Card</span>
        </div>

    </div>

    <div class="photo-area">

        <img id="studentPhoto"
        src="assets/student.png">

    </div>

    <div class="details">

        <h2 id="studentName">Loading...</h2>

        <p>ID :
            <span id="studentId">------</span>
        </p>

        <p>Course :
            <span id="studentCourse">------</span>
        </p>

        <p>Valid Till :
            <span id="expiryDate">------</span>
        </p>

        <div id="status" class="active">
            ACTIVE
        </div>

    </div>

    <div id="qrcode"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script type="module" src="student-card.js"></script>

</body>
</html>
