<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Students | COACHsir Academy</title>

<link rel="stylesheet" href="admin.css">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</head>


<body>


<div class="container">


<h1>🎓 Student Management</h1>


<div class="card">


<h2>Add New Student</h2>


<input id="studentId" placeholder="Student ID">

<input id="studentName" placeholder="Student Name">

<input id="studentMobile" placeholder="Mobile Number">


<select id="studentProgram">

<option value="NEET Biology">
NEET Biology
</option>

<option value="Class 11 Biology">
Class 11 Biology
</option>

<option value="Class 12 Biology">
Class 12 Biology
</option>

<option value="SSC">
SSC
</option>

<option value="CTET">
CTET
</option>

</select>


<input id="studentClass" placeholder="Class">


<input id="scanLimit" type="number" value="100">


<button onclick="addStudent()">
➕ Add Student
</button>


</div>





<div class="card">

<h2>Student List</h2>


<table border="1" width="100%">

<thead>

<tr>

<th>ID</th>
<th>Name</th>
<th>Class</th>
<th>Mobile</th>
<th>Status</th>

</tr>

</thead>


<tbody id="studentList">

</tbody>


</table>


</div>



</div>




<script>

const firebaseConfig = {

apiKey: "YOUR_API_KEY",

authDomain: "YOUR_PROJECT.firebaseapp.com",

projectId: "YOUR_PROJECT_ID"

};


firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();


</script>



<script src="students.js"></script>


</body>

</html>
