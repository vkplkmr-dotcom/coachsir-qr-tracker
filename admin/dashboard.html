<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>COACHsir Admin Dashboard</title>

<link rel="stylesheet" href="admin.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</head>

<body>

<div class="layout">

<!-- Sidebar -->
<aside class="sidebar">

<h2>🚀 COACHsir</h2>
<p class="admin-text">Admin Panel</p>

<nav>

<a class="active">📊 Dashboard</a>

<a href="#">👨 Students</a>

<a href="#">💳 Payments</a>

<a href="#">📷 Attendance</a>

<a href="#">🎓 CBT Cards</a>

<a href="#">⚙ Settings</a>

</nav>

<button class="logout" onclick="logout()">
🚪 Logout
</button>

</aside>


<!-- Main -->
<main class="main">


<header>

<h1>Dashboard</h1>

<div class="profile">
👤 Admin
</div>

</header>



<section class="cards">


<div class="card">
<h3>👨 Students</h3>
<h1 id="totalStudents">0</h1>
</div>


<div class="card">
<h3>⏳ Pending Payments</h3>
<h1 id="pendingPayments">0</h1>
</div>


<div class="card">
<h3>✅ Approved</h3>
<h1 id="approvedPayments">0</h1>
</div>


<div class="card">
<h3>📅 Today's Scan</h3>
<h1 id="todayScan">0</h1>
</div>


</section>



<section class="panel">

<h2>Recent Activity</h2>

<div id="activity">

Loading data...

</div>


</section>


</main>

</div>


<script src="dashboard.js"></script>

</body>
</html>
